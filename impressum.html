<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — Vivos Media</title>
<style>
@font-face {
  font-family: 'Space Grotesk';
  src: url('SpaceGrotesk-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DM Sans';
  src: url('DMSans-VariableFont_opsz,wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DM Sans';
  src: url('DMSans-Italic-VariableFont_opsz,wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --r:#FF3D14;
  --k:#141210;
  --p:#F4EFE6;
  --s:#E6DFD0;
  --g:#8A857C;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--p);color:var(--k);line-height:1.75;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{background:var(--k);padding:1.2rem 4rem;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:baseline;gap:0;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.03em;}
.logo-w{color:var(--p);}
.logo-d{color:var(--r);}
.logo-s{color:var(--g);font-size:15px;letter-spacing:0;}
.nav-back{font-size:13px;font-weight:300;color:var(--g);text-decoration:none;letter-spacing:.04em;transition:color .2s;}
.nav-back:hover{color:var(--p);}

/* CONTENT */
main{max-width:760px;margin:0 auto;padding:5rem 2rem 6rem;}

h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(28px,4vw,42px);letter-spacing:-.04em;line-height:1.1;margin-bottom:2.5rem;color:var(--k);}
h1 span{color:var(--r);}
h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.02em;margin:2.8rem 0 .9rem;color:var(--k);padding-bottom:.5rem;border-bottom:1px solid var(--s);}
p{font-size:15px;color:#3a3630;margin-bottom:.7rem;line-height:1.75;}
a{color:var(--r);text-decoration:none;}
a:hover{text-decoration:underline;}

.block{background:#fff;border:1px solid var(--s);border-radius:8px;padding:1.8rem 2.2rem;margin-top:1rem;}
.block p{margin-bottom:.4rem;}
.block p:last-child{margin-bottom:0;}

.source{margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--s);font-size:12px;color:var(--g);}
.source a{color:var(--g);}

/* FOOTER */
footer{background:var(--k);padding:2rem 4rem;display:flex;align-items:center;justify-content:space-between;}
footer .logo-w{color:var(--p);}
.fcopy{font-size:12px;font-weight:300;color:var(--g);}

@media(max-width:680px){
  nav,footer{padding:1.2rem 1.5rem;}
  main{padding:3rem 1.4rem 4rem;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <span class="logo-w">vivos</span><span class="logo-d">.</span><span class="logo-s">media</span>
  </a>
  <a href="index.html" class="nav-back">← Zurück zur Startseite</a>
</nav>

<main>

<h1>Impressum<span>.</span></h1>

<div class="block">
  <p><strong>Theophil Zybell</strong></p>
  <p>Kufsteiner Straße 84<br>10825 Berlin</p>
</div>

<h2>Kontakt</h2>
<div class="block">
  <p>Telefon: <a href="tel:+4901774600861">01774 600861</a></p>
  <p>E-Mail: <a href="mailto:theo@vivos.media">theo@vivos.media</a></p>
</div>

<p class="source">Quelle: <a href="https://www.e-recht24.de" target="_blank" rel="noopener noreferrer">e-recht24.de</a></p>

</main>

<footer>
  <a href="index.html" class="logo">
    <span class="logo-w">vivos</span><span class="logo-d">.</span><span class="logo-s">media</span>
  </a>
  <span class="fcopy">© 2026 Vivos Media. Alle Rechte vorbehalten.</span>
</footer>

</body>
</html>
